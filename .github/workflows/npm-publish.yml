name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v1.4.5)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.event.release.tag_name }}"
          fi
          npm pkg set version="${VERSION#v}"

      - name: Publish to npm
        run: |
          # setup-node sets NODE_AUTH_TOKEN to GITHUB_TOKEN via GITHUB_ENV,
          # which step-level env: cannot override. Unset at shell level so npm
          # falls through to OIDC exchange (Trusted Publishing).
          unset NODE_AUTH_TOKEN
          unset NPM_CONFIG_USERCONFIG
          npm publish --provenance